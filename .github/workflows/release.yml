name: Provider Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}_${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve dependencies
        run: go mod tidy

      - name: Build provider binary
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          OUT_DIR="release/${VERSION}"
          mkdir -p "$OUT_DIR"

          export GOOS="${{ matrix.goos }}"
          export GOARCH="${{ matrix.goarch }}"

          BIN_NAME="terraform-provider-namingservice_v${VERSION}_${GOOS}_${GOARCH}${{ matrix.ext }}"
          go build -o "$OUT_DIR/$BIN_NAME"

          # Zip for Terraform Registry platform artifacts
          ZIP_NAME="terraform-provider-namingservice_v${VERSION}_${GOOS}_${GOARCH}.zip"
          zip -j "$OUT_DIR/$ZIP_NAME" "$OUT_DIR/$BIN_NAME"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: provider-${{ matrix.goos }}-${{ matrix.goarch }}
          path: release/

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          cd "release/${VERSION}"
          sha256sum terraform-provider-namingservice_v${VERSION}_*.zip > SHA256SUMS.txt

      - name: Import GPG signing key (optional)
        if: ${{ secrets.GPG_PRIVATE_KEY != '' && secrets.GPG_PASSPHRASE != '' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Sign SHA256SUMS.txt (optional)
        if: ${{ secrets.GPG_PRIVATE_KEY != '' && secrets.GPG_PASSPHRASE != '' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "release/${VERSION}"
          gpg --batch --yes --pinentry-mode loopback --passphrase "${{ secrets.GPG_PASSPHRASE }}" --detach-sign --armor --output SHA256SUMS.txt.sig SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: namingservice provider ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            release/**
